services:
  dev:
    build:
      context: .
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR-}
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - .:/workspace
      - cargo-registry:/opt/cargo/registry
      - cargo-git:/opt/cargo/git
      - cargo-bin:/opt/cargo/bin
      - target-cache:/workspace/target
      - maturin-cache:/workspace/target-maturin
    working_dir: /workspace
    stdin_open: true
    tty: true

  # Cached test: reuses dev image + persistent cargo cache volumes.
  # z3-sys and other deps are only compiled on first run.
  test:
    build:
      context: .
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR-}
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - SKIP_MATURIN_BUILD=1
    volumes:
      - .:/workspace
      - cargo-registry:/opt/cargo/registry
      - cargo-git:/opt/cargo/git
      - target-cache:/workspace/target
      - maturin-cache:/workspace/target-maturin
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        cargo nextest run --workspace --exclude saf-python &&
        CARGO_TARGET_DIR=/workspace/target-maturin maturin develop &&
        pytest python/tests/ -v

  # Hermetic test: clean-room build with no cache. Slower but fully
  # reproducible — use for CI or when you suspect cache corruption.
  test-clean:
    build:
      context: .
      target: test
      args:
        APT_MIRROR: ${APT_MIRROR-}

  build:
    build:
      context: .
      target: runtime
      args:
        APT_MIRROR: ${APT_MIRROR-}

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data

volumes:
  cargo-registry:
  cargo-git:
  cargo-bin:
  target-cache:
  maturin-cache:
  neo4j-data:
